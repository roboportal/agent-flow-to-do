name: "Agent: Generate Spec"

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  generate-spec:
    # Runs on /agent proceed on an issue (not a PR)
    if: >-
      !github.event.issue.pull_request
      && contains(github.event.comment.body, '/agent proceed')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup agent
        id: setup
        uses: ./.github/actions/setup-agent

      - name: Check authorization
        id: auth
        working-directory: .github/agent
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: npx tsx parse-config.ts --check-user "$COMMENT_AUTHOR" >> "$GITHUB_OUTPUT"

      - name: Acknowledge and build prompt
        if: steps.auth.outputs.authorized == 'true'
        id: prepare
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          STACK: ${{ steps.setup.outputs.stack }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

          ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER)
          ISSUE_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
          ISSUE_BODY=$(echo "$ISSUE_JSON" | jq -r '.body // ""')
          COMMENTS=$(gh api repos/${{ github.repository }}/issues/$ISSUE_NUMBER/comments --paginate \
            | jq -r '.[] | "**\(.user.login)** commented:\n\(.body)\n---"')

          {
            echo "title<<ISSUE_TITLE_EOF"
            echo "$ISSUE_TITLE"
            echo "ISSUE_TITLE_EOF"
          } >> "$GITHUB_OUTPUT"

          mkdir -p features
          SPEC_FILE="features/issue-${ISSUE_NUMBER}.md"

          {
            cat .github/agent/spec-prompt.md
            echo
            echo "## Tech Stack"
            echo "$STACK"
            echo
            echo "## Issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
            echo
            echo "### Description"
            echo "$ISSUE_BODY"
            echo
            echo "### Discussion"
            echo "$COMMENTS"
            echo
            echo "## Task"
            echo "Write the feature spec to \`${SPEC_FILE}\`. Do not modify any other files."
          } > /tmp/claude_prompt.md

      - name: Run Claude Code
        if: steps.auth.outputs.authorized == 'true'
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/claude_prompt.md
          allowed_tools: "Read,Write,Edit,Glob,Grep"
          model: ${{ steps.setup.outputs.model }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: "30"

      - name: Create spec PR and acknowledge
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ steps.prepare.outputs.title }}
        run: |
          SPEC_FILE="features/issue-${ISSUE_NUMBER}.md"
          BRANCH="spec/issue-${ISSUE_NUMBER}"

          if [ ! -f "$SPEC_FILE" ]; then
            echo "Error: Claude did not produce $SPEC_FILE"
            exit 1
          fi

          # A spec branch from a previous run would indicate an open/abandoned spec PR.
          # Use /agent regenerate on that PR instead of re-running /agent proceed.
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            echo "Branch $BRANCH already exists on origin."
            gh issue comment "$ISSUE_NUMBER" --body "A spec branch \`${BRANCH}\` already exists. If there is an open spec PR, post \`/agent regenerate\` on it to update the spec. Otherwise, close or delete that branch and re-run \`/agent proceed\`."
            exit 1
          fi

          REVIEWERS=$(cd .github/agent && npx tsx parse-config.ts --list reviewers | paste -sd, -)

          git config user.name "agent-flow[bot]"
          git config user.email "agent-flow[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add "$SPEC_FILE"
          git commit -m "Add spec for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}"
          git push origin "$BRANCH"

          PR_BODY="## Spec for #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          This specification was auto-generated by Agent Flow from issue #${ISSUE_NUMBER}.

          **Spec file:** \`${SPEC_FILE}\`

          ### How to review
          - Review the spec file below
          - Leave comments on specific sections
          - Post \`/agent regenerate\` to request an updated version incorporating your feedback
          - Approve and merge to trigger the implementation phase

          ---
          Source issue: #${ISSUE_NUMBER}"

          PR_ARGS=(--title "[SPEC] ${ISSUE_TITLE}" --body "$PR_BODY" --head "$BRANCH" --base "main")
          if [ -n "$REVIEWERS" ]; then
            PR_ARGS+=(--reviewer "$REVIEWERS")
          fi

          PR_URL=$(gh pr create "${PR_ARGS[@]}")
          echo "Created PR: $PR_URL"

          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket

  regenerate-spec:
    # Runs on /agent regenerate on a spec PR
    if: >-
      github.event.issue.pull_request
      && contains(github.event.comment.body, '/agent regenerate')
    runs-on: ubuntu-latest
    steps:
      - name: Get PR details
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          PR_BODY: ${{ github.event.issue.body }}
        run: |
          HEAD_REF=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER --jq '.head.ref')
          ISSUE_NUMBER=$(echo "$HEAD_REF" | grep -oP 'issue-\K\d+' || echo "$PR_NUMBER")
          SOURCE_ISSUE=$(echo "$PR_BODY" | grep -oP 'Source issue: #\K\d+' || echo "")

          echo "head_ref=$HEAD_REF" >> "$GITHUB_OUTPUT"
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "source_issue=$SOURCE_ISSUE" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.head_ref }}

      - name: Setup agent
        id: setup
        uses: ./.github/actions/setup-agent

      - name: Check authorization
        id: auth
        working-directory: .github/agent
        env:
          COMMENT_AUTHOR: ${{ github.event.comment.user.login }}
        run: npx tsx parse-config.ts --check-user "$COMMENT_AUTHOR" >> "$GITHUB_OUTPUT"

      - name: Acknowledge and build prompt
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          SOURCE_ISSUE: ${{ steps.pr.outputs.source_issue }}
          ISSUE_NUMBER: ${{ steps.pr.outputs.issue_number }}
          STACK: ${{ steps.setup.outputs.stack }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=eyes

          SPEC_FILE="features/issue-${ISSUE_NUMBER}.md"

          PR_COMMENTS=$(gh api repos/${{ github.repository }}/pulls/$PR_NUMBER/comments --paginate \
            | jq -r '.[] | "**\(.user.login)** on \(.path // "general"):\n\(.body)\n---"')
          ISSUE_COMMENTS=$(gh api repos/${{ github.repository }}/issues/$PR_NUMBER/comments --paginate \
            | jq -r '.[] | "**\(.user.login)** commented:\n\(.body)\n---"')

          ORIG_ISSUE_BLOCK=""
          if [ -n "$SOURCE_ISSUE" ]; then
            ISSUE_JSON=$(gh api repos/${{ github.repository }}/issues/$SOURCE_ISSUE)
            ORIG_TITLE=$(echo "$ISSUE_JSON" | jq -r '.title')
            ORIG_BODY=$(echo "$ISSUE_JSON" | jq -r '.body // ""')
            ORIG_COMMENTS=$(gh api repos/${{ github.repository }}/issues/$SOURCE_ISSUE/comments --paginate \
              | jq -r '.[] | "**\(.user.login)** commented:\n\(.body)\n---"')
            ORIG_ISSUE_BLOCK="## Original Issue #${SOURCE_ISSUE}: ${ORIG_TITLE}

          ### Description
          ${ORIG_BODY}

          ### Discussion
          ${ORIG_COMMENTS}"
          fi

          {
            cat .github/agent/spec-prompt.md
            echo
            echo "## Tech Stack"
            echo "$STACK"
            echo
            echo "$ORIG_ISSUE_BLOCK"
            echo
            echo "## Review Feedback on Current Spec"
            echo
            echo "### Review Comments"
            echo "$PR_COMMENTS"
            echo
            echo "### General Comments"
            echo "$ISSUE_COMMENTS"
            echo
            echo "## Task"
            echo "The current spec is at \`${SPEC_FILE}\`. Read it, then rewrite it incorporating the review feedback above. Keep what works; fix what was criticized. Do not modify any other files."
          } > /tmp/claude_prompt.md

      - name: Run Claude Code
        if: steps.auth.outputs.authorized == 'true'
        uses: anthropics/claude-code-base-action@beta
        with:
          prompt_file: /tmp/claude_prompt.md
          allowed_tools: "Read,Write,Edit,Glob,Grep"
          model: ${{ steps.setup.outputs.model }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: "30"

      - name: Commit and acknowledge
        if: steps.auth.outputs.authorized == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pr.outputs.issue_number }}
        run: |
          SPEC_FILE="features/issue-${ISSUE_NUMBER}.md"

          git config user.name "agent-flow[bot]"
          git config user.email "agent-flow[bot]@users.noreply.github.com"
          git add "$SPEC_FILE"

          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Regenerate spec based on review feedback"
            git push
          fi

          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -f content=rocket
