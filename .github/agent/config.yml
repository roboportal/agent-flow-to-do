# Agent Flow Configuration
# Customize this file for your project.

# Describe your tech stack so the agent understands your project context.
stack: "ruby on rails"

# Files to always include in the agent's context, regardless of relevance scoring.
always_include:
  - "README.md"
  # - "package.json"
  # - "pyproject.toml"
  # - "go.mod"

# GitHub usernames allowed to trigger agent commands (/agent proceed, /agent regenerate).
# In public repos, this prevents unauthorized users from triggering API calls.
# Leave empty to allow any user (not recommended for public repos).
allowed_users: 
  - malykhin
  - Etun
  # - "your-username"
  # - "trusted-contributor"

# GitHub usernames to auto-assign as reviewers on agent-created PRs.
reviewers: 
  - malykhin
  - Etun

# Trigger commands. Change these if they conflict with other bots.
triggers:
  proceed: "/agent proceed"
  regenerate: "/agent regenerate"

# Claude model to use for generation.
model: "claude-sonnet-4-20250514"

# Maximum token budget for repository context sent to Claude.
# The build-context script will select files up to this limit.
max_context_tokens: 80000
